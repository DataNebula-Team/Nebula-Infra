<svg width="100%" viewBox="0 0 680 398" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Enrutamiento Nginx Proxy Manager — NEBULA</title>
<desc>Flujo de una petición HTTP desde el navegador del usuario hasta el servicio interno correcto, a través de Nginx Proxy Manager en SRV-PROXY.</desc>
<style>
  text { font-family: system-ui, sans-serif; }
  .th  { font-size: 13px; font-weight: 500; }
  .ts  { font-size: 11px; font-weight: 400; }
  .tm  { font-size: 10px; font-family: monospace; }
</style>
<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- ── Navegador ── -->
<rect x="190" y="20" width="300" height="50" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.8"/>
<text class="th" fill="#444441" x="340" y="38" text-anchor="middle" dominant-baseline="central">Navegador del usuario</text>
<text class="tm" fill="#888780" x="340" y="56" text-anchor="middle" dominant-baseline="central">nebula-[servicio].coderhivex.com</text>

<!-- flecha Navegador → Proxy -->
<line x1="340" y1="70" x2="340" y2="98" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>
<rect x="354" y="76" width="76" height="16" rx="3" fill="#F1EFE8" stroke="#D3D1C7" stroke-width="0.5"/>
<text class="tm" fill="#888780" x="392" y="84" text-anchor="middle" dominant-baseline="central">:80 / :443</text>

<!-- ── SRV-PROXY con Nginx ── -->
<rect x="80" y="98" width="520" height="66" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="1.2"/>
<text class="th" fill="#0C447C" x="340" y="118" text-anchor="middle" dominant-baseline="central">SRV-PROXY — Nginx Proxy Manager</text>
<text class="ts" fill="#185FA5" x="340" y="136" text-anchor="middle" dominant-baseline="central">Lee el header "Host:" y redirige al servicio correspondiente</text>
<text class="tm" fill="#185FA5" x="340" y="156" text-anchor="middle" dominant-baseline="central">34.225.146.184 · admin UI: :81</text>

<!-- Tres flechas verticales hacia los servicios -->
<line x1="180" y1="164" x2="180" y2="200" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>
<line x1="340" y1="164" x2="340" y2="200" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>
<line x1="500" y1="164" x2="500" y2="200" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>

<!-- ── Tres servicios destino ── -->

<!-- Airflow UI -->
<rect x="80" y="200" width="200" height="66" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.8"/>
<text class="th" fill="#3C3489" x="180" y="220" text-anchor="middle" dominant-baseline="central">SRV-MASTER</text>
<text class="ts" fill="#534AB7" x="180" y="238" text-anchor="middle" dominant-baseline="central">Airflow Webserver</text>
<text class="tm" fill="#534AB7" x="180" y="256" text-anchor="middle" dominant-baseline="central">10.0.2.54 : 8080</text>

<!-- Flower UI -->
<rect x="240" y="200" width="200" height="66" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.8"/>
<text class="th" fill="#3C3489" x="340" y="220" text-anchor="middle" dominant-baseline="central">SRV-MASTER</text>
<text class="ts" fill="#534AB7" x="340" y="238" text-anchor="middle" dominant-baseline="central">Celery Flower</text>
<text class="tm" fill="#534AB7" x="340" y="256" text-anchor="middle" dominant-baseline="central">10.0.2.54 : 5555</text>

<!-- RabbitMQ UI -->
<rect x="400" y="200" width="200" height="66" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.8"/>
<text class="th" fill="#712B13" x="500" y="220" text-anchor="middle" dominant-baseline="central">SRV-RABBIT</text>
<text class="ts" fill="#993C1D" x="500" y="238" text-anchor="middle" dominant-baseline="central">RabbitMQ Management</text>
<text class="tm" fill="#993C1D" x="500" y="256" text-anchor="middle" dominant-baseline="central">10.0.2.61 : 15672</text>

<!-- ── Tabla de proxy hosts ── -->
<rect x="40" y="288" width="600" height="24" rx="6" fill="#2C2C2A"/>
<text class="tm" fill="#F1EFE8" x="56"  y="300" dominant-baseline="central">DOMINIO PÚBLICO</text>
<text class="tm" fill="#F1EFE8" x="296" y="300" dominant-baseline="central">DESTINO INTERNO</text>
<text class="tm" fill="#F1EFE8" x="496" y="300" dominant-baseline="central">ESTADO</text>

<rect x="40" y="312" width="600" height="26" fill="#F8FBFF" stroke="#D3D1C7" stroke-width="0.5"/>
<text class="tm" fill="#534AB7" x="56"  y="325" dominant-baseline="central">nebula-airflow.coderhivex.com</text>
<text class="tm" fill="#2C2C2A" x="296" y="325" dominant-baseline="central">http://10.0.2.54:8080</text>
<rect x="496" y="317" width="54" height="14" rx="3" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
<text class="tm" fill="#27500A" x="523" y="324" text-anchor="middle" dominant-baseline="central">Online</text>

<rect x="40" y="338" width="600" height="26" fill="#FAFAFA" stroke="#D3D1C7" stroke-width="0.5"/>
<text class="tm" fill="#534AB7" x="56"  y="351" dominant-baseline="central">nebula-flower.coderhivex.com</text>
<text class="tm" fill="#2C2C2A" x="296" y="351" dominant-baseline="central">http://10.0.2.54:5555</text>
<rect x="496" y="343" width="54" height="14" rx="3" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
<text class="tm" fill="#27500A" x="523" y="350" text-anchor="middle" dominant-baseline="central">Online</text>

<rect x="40" y="364" width="600" height="26" fill="#F8FBFF" stroke="#D3D1C7" stroke-width="0.5"/>
<text class="tm" fill="#534AB7" x="56"  y="377" dominant-baseline="central">nebula-rabbitmq.coderhivex.com</text>
<text class="tm" fill="#2C2C2A" x="296" y="377" dominant-baseline="central">http://10.0.2.61:15672</text>
<rect x="496" y="369" width="54" height="14" rx="3" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
<text class="tm" fill="#27500A" x="523" y="376" text-anchor="middle" dominant-baseline="central">Online</text>

<!-- Líneas separadoras verticales de la tabla -->
<line x1="290" y1="288" x2="290" y2="390" stroke="#444441" stroke-width="0.5"/>
<line x1="490" y1="288" x2="490" y2="390" stroke="#444441" stroke-width="0.5"/>
<rect x="40" y="288" width="600" height="102" rx="6" fill="none" stroke="#D3D1C7" stroke-width="0.5"/>
</svg>