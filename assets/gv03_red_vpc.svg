<svg width="100%" viewBox="0 0 680 600" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Topología de red — VPC NEBULA</title>
<desc>Diagrama de red por contención mostrando la VPC, subnets pública y privada, Internet Gateway, NAT Gateway y las instancias EC2 en cada subnet.</desc>
<style>
  text { font-family: system-ui, sans-serif; }
  .th  { font-size: 13px; font-weight: 500; }
  .ts  { font-size: 11px; font-weight: 400; }
  .tm  { font-size: 10px; font-family: monospace; }
</style>
<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arr2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#3B6D11" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- ── Internet ── -->
<rect x="40" y="20" width="600" height="44" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.8"/>
<text class="th" fill="#444441" x="340" y="37" text-anchor="middle" dominant-baseline="central">Internet</text>
<text class="tm" fill="#888780" x="340" y="54" text-anchor="middle" dominant-baseline="central">tráfico público entrante y saliente</text>

<!-- flecha Internet ↕ IGW -->
<line x1="340" y1="64" x2="340" y2="88" stroke="#888780" stroke-width="1" marker-end="url(#arr)" marker-start="url(#arr)"/>

<!-- ── IGW ── -->
<rect x="254" y="88" width="172" height="44" rx="6" fill="#E6F1FB" stroke="#185FA5" stroke-width="1"/>
<text class="th" fill="#0C447C" x="340" y="105" text-anchor="middle" dominant-baseline="central">IGW-NEBULA</text>
<text class="tm" fill="#185FA5" x="340" y="121" text-anchor="middle" dominant-baseline="central">igw-02343475c4654c00f</text>

<!-- flecha IGW ↓ VPC -->
<line x1="340" y1="132" x2="340" y2="152" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>

<!-- ══ VPC container ══ -->
<rect x="40" y="152" width="600" height="424" rx="10" fill="none" stroke="#3B6D11" stroke-width="1.5" stroke-dasharray="7 3"/>
<text class="th" fill="#3B6D11" x="56" y="170" dominant-baseline="central">VPC-NEBULA</text>
<text class="tm" fill="#3B6D11" x="56" y="185" dominant-baseline="central">vpc-08a42c293b55cef82 · 10.0.0.0/16 · us-east-1d</text>

<!-- ── SUBNET PÚBLICA ── -->
<rect x="60" y="196" width="560" height="148" rx="8" fill="#EBF4FF" stroke="#185FA5" stroke-width="0.8"/>
<text class="th" fill="#185FA5" x="76" y="214" dominant-baseline="central">SUBNET-NEBULA-PUBLIC</text>
<text class="tm" fill="#185FA5" x="76" y="229" dominant-baseline="central">subnet-0b25e7503b90271d4 · 10.0.1.0/24</text>

<!-- SRV-PROXY dentro de subnet pública -->
<rect x="76" y="238" width="200" height="52" rx="6" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.8"/>
<text class="th" fill="#0C447C" x="176" y="256" text-anchor="middle" dominant-baseline="central">SRV-PROXY</text>
<text class="tm" fill="#185FA5" x="176" y="272" text-anchor="middle" dominant-baseline="central">10.0.1.233</text>
<text class="ts" fill="#185FA5" x="176" y="284" text-anchor="middle" dominant-baseline="central">EIP: 34.225.146.184</text>

<!-- NAT Gateway dentro de subnet pública -->
<rect x="310" y="238" width="200" height="52" rx="6" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.8"/>
<text class="th" fill="#27500A" x="410" y="256" text-anchor="middle" dominant-baseline="central">NATGW-NEBULA</text>
<text class="tm" fill="#3B6D11" x="410" y="272" text-anchor="middle" dominant-baseline="central">10.0.1.78</text>
<text class="ts" fill="#3B6D11" x="410" y="284" text-anchor="middle" dominant-baseline="central">EIP: 3.94.237.145</text>

<!-- RT-PUBLIC -->
<rect x="76" y="298" width="434" height="36" rx="4" fill="#F1EFE8" stroke="#D3D1C7" stroke-width="0.5"/>
<text class="ts" fill="#444441" x="90" y="316" dominant-baseline="central" font-weight="500">RT-PUBLIC</text>
<text class="tm" fill="#5F5E5A" x="190" y="316" dominant-baseline="central">0.0.0.0/0 → IGW-NEBULA</text>
<text class="tm" fill="#5F5E5A" x="390" y="316" dominant-baseline="central">10.0.0.0/16 → local</text>

<!-- flecha NAT ↓ hacia subnet privada (salida a internet de servidores privados) -->
<line x1="410" y1="344" x2="410" y2="372" stroke="#3B6D11" stroke-width="1" stroke-dasharray="4 2" marker-end="url(#arr2)"/>
<text class="tm" fill="#3B6D11" x="424" y="360" dominant-baseline="central">salida a internet</text>

<!-- ── SUBNET PRIVADA ── -->
<rect x="60" y="372" width="560" height="188" rx="8" fill="#F0FBF5" stroke="#0F6E56" stroke-width="0.8"/>
<text class="th" fill="#0F6E56" x="76" y="390" dominant-baseline="central">SUBNET-NEBULA-PRIVATE</text>
<text class="tm" fill="#0F6E56" x="76" y="405" dominant-baseline="central">subnet-0628868e497476f97 · 10.0.2.0/24</text>

<!-- Instancias en subnet privada: fila 1 -->
<rect x="76"  y="416" width="116" height="44" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.8"/>
<text class="th" fill="#3C3489" x="134" y="432" text-anchor="middle" dominant-baseline="central">SRV-MASTER</text>
<text class="tm" fill="#534AB7" x="134" y="450" text-anchor="middle" dominant-baseline="central">10.0.2.54</text>

<rect x="204" y="416" width="116" height="44" rx="6" fill="#FAECE7" stroke="#993C1D" stroke-width="0.8"/>
<text class="th" fill="#712B13" x="262" y="432" text-anchor="middle" dominant-baseline="central">SRV-RABBIT</text>
<text class="tm" fill="#993C1D" x="262" y="450" text-anchor="middle" dominant-baseline="central">10.0.2.61</text>

<rect x="332" y="416" width="116" height="44" rx="6" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.8"/>
<text class="th" fill="#633806" x="390" y="432" text-anchor="middle" dominant-baseline="central">SRV-SPARK</text>
<text class="tm" fill="#854F0B" x="390" y="450" text-anchor="middle" dominant-baseline="central">10.0.2.103</text>

<!-- Instancias en subnet privada: fila 2 Workers -->
<rect x="76"  y="472" width="116" height="44" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
<text class="th" fill="#085041" x="134" y="488" text-anchor="middle" dominant-baseline="central">SRV-WORKER1</text>
<text class="tm" fill="#0F6E56" x="134" y="506" text-anchor="middle" dominant-baseline="central">10.0.2.240</text>

<rect x="204" y="472" width="116" height="44" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
<text class="th" fill="#085041" x="262" y="488" text-anchor="middle" dominant-baseline="central">SRV-WORKER2</text>
<text class="tm" fill="#0F6E56" x="262" y="506" text-anchor="middle" dominant-baseline="central">10.0.2.95</text>

<rect x="332" y="472" width="116" height="44" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
<text class="th" fill="#085041" x="390" y="488" text-anchor="middle" dominant-baseline="central">SRV-WORKER3</text>
<text class="tm" fill="#0F6E56" x="390" y="506" text-anchor="middle" dominant-baseline="central">10.0.2.79</text>

<!-- RT-PRIVATE -->
<rect x="460" y="416" width="144" height="100" rx="4" fill="#F1EFE8" stroke="#D3D1C7" stroke-width="0.5"/>
<text class="ts" fill="#444441" x="532" y="432" text-anchor="middle" dominant-baseline="central" font-weight="500">RT-PRIVATE</text>
<text class="tm" fill="#5F5E5A" x="472" y="450" dominant-baseline="central">0.0.0.0/0</text>
<text class="tm" fill="#3B6D11" x="472" y="466" dominant-baseline="central">→ NAT Gateway</text>
<text class="tm" fill="#5F5E5A" x="472" y="484" dominant-baseline="central">10.0.0.0/16</text>
<text class="tm" fill="#5F5E5A" x="472" y="500" dominant-baseline="central">→ local</text>
<text class="tm" fill="#5F5E5A" x="472" y="516" dominant-baseline="central">25.0.2.0/24 → peering</text>
</svg>