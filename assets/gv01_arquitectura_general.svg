<svg width="100%" viewBox="0 0 680 520" role="img" xmlns="http://www.w3.org/2000/svg">
<title>NEBULA — arquitectura general del clúster</title>
<desc>Las 5 capas del clúster NEBULA organizadas verticalmente: internet, proxy público, orquestación y mensajería, ejecución distribuida, y procesamiento Spark.</desc>
<style>
  text { font-family: system-ui, sans-serif; }
  .th  { font-size: 14px; font-weight: 500; }
  .ts  { font-size: 12px; font-weight: 400; }
</style>
<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- ── Capa 1: Internet ── -->
<rect x="200" y="20" width="280" height="52" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.8"/>
<text class="th" fill="#444441" x="340" y="42" text-anchor="middle" dominant-baseline="central">Internet</text>
<text class="ts" fill="#888780" x="340" y="61" text-anchor="middle" dominant-baseline="central">tráfico HTTP · HTTPS · SSH</text>

<!-- flecha 1→2 -->
<line x1="340" y1="72" x2="340" y2="100" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>

<!-- ── Capa 2: Proxy ── -->
<rect x="100" y="100" width="480" height="64" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="1"/>
<text class="th" fill="#0C447C" x="340" y="122" text-anchor="middle" dominant-baseline="central">SRV-PROXY — Subnet pública</text>
<text class="ts" fill="#185FA5" x="340" y="142" text-anchor="middle" dominant-baseline="central">Nginx Proxy Manager · única IP pública · bastión SSH</text>
<text class="ts" fill="#185FA5" x="340" y="158" text-anchor="middle" dominant-baseline="central">34.225.146.184</text>

<!-- flecha 2→3 -->
<line x1="340" y1="164" x2="340" y2="192" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>

<!-- ── Capa 3: Orquestación + Mensajería ── -->
<rect x="60" y="192" width="560" height="80" rx="8" fill="#F4F3FE" stroke="#AFA9EC" stroke-width="0.8"/>
<text class="ts" fill="#534AB7" x="340" y="208" text-anchor="middle" dominant-baseline="central">ORQUESTACIÓN Y MENSAJERÍA — Subnet privada</text>

<rect x="80" y="218" width="230" height="44" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.8"/>
<text class="th" fill="#3C3489" x="195" y="234" text-anchor="middle" dominant-baseline="central">SRV-MASTER</text>
<text class="ts" fill="#534AB7" x="195" y="252" text-anchor="middle" dominant-baseline="central">Airflow · Scheduler · Flower · PostgreSQL</text>

<rect x="370" y="218" width="230" height="44" rx="6" fill="#FAECE7" stroke="#993C1D" stroke-width="0.8"/>
<text class="th" fill="#712B13" x="485" y="234" text-anchor="middle" dominant-baseline="central">SRV-RABBIT</text>
<text class="ts" fill="#993C1D" x="485" y="252" text-anchor="middle" dominant-baseline="central">RabbitMQ · broker de mensajería</text>

<!-- flecha 3→4 -->
<line x1="340" y1="272" x2="340" y2="300" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>

<!-- ── Capa 4: Workers ── -->
<rect x="60" y="300" width="560" height="80" rx="8" fill="#EDFAF5" stroke="#9FE1CB" stroke-width="0.8"/>
<text class="ts" fill="#0F6E56" x="340" y="316" text-anchor="middle" dominant-baseline="central">EJECUCIÓN DISTRIBUIDA — Subnet privada</text>

<rect x="80"  y="326" width="152" height="44" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
<text class="th" fill="#085041" x="156" y="342" text-anchor="middle" dominant-baseline="central">SRV-WORKER1</text>
<text class="ts" fill="#0F6E56" x="156" y="360" text-anchor="middle" dominant-baseline="central">Celery + Spark Worker</text>

<rect x="264" y="326" width="152" height="44" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
<text class="th" fill="#085041" x="340" y="342" text-anchor="middle" dominant-baseline="central">SRV-WORKER2</text>
<text class="ts" fill="#0F6E56" x="340" y="360" text-anchor="middle" dominant-baseline="central">Celery + Spark Worker</text>

<rect x="448" y="326" width="152" height="44" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
<text class="th" fill="#085041" x="524" y="342" text-anchor="middle" dominant-baseline="central">SRV-WORKER3</text>
<text class="ts" fill="#0F6E56" x="524" y="360" text-anchor="middle" dominant-baseline="central">Celery + Spark Worker</text>

<!-- flecha 4→5 -->
<line x1="340" y1="380" x2="340" y2="408" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>

<!-- ── Capa 5: Spark ── -->
<rect x="100" y="408" width="480" height="64" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="1"/>
<text class="th" fill="#633806" x="340" y="430" text-anchor="middle" dominant-baseline="central">SRV-SPARK — Subnet privada</text>
<text class="ts" fill="#854F0B" x="340" y="450" text-anchor="middle" dominant-baseline="central">Spark Master · spark-worker-1 · coordina procesamiento distribuido</text>
<text class="ts" fill="#854F0B" x="340" y="466" text-anchor="middle" dominant-baseline="central">10.0.2.103</text>

<!-- ── Leyenda ── -->
<line x1="60" y1="494" x2="620" y2="494" stroke="#D3D1C7" stroke-width="0.5"/>
<rect x="60"  y="502" width="10" height="10" rx="2" fill="#E6F1FB"  stroke="#185FA5" stroke-width="0.5"/>
<text class="ts" fill="#444441" x="76"  y="508" dominant-baseline="central">Proxy público</text>
<rect x="175" y="502" width="10" height="10" rx="2" fill="#EEEDFE"  stroke="#534AB7" stroke-width="0.5"/>
<text class="ts" fill="#444441" x="191" y="508" dominant-baseline="central">Airflow</text>
<rect x="258" y="502" width="10" height="10" rx="2" fill="#FAECE7"  stroke="#993C1D" stroke-width="0.5"/>
<text class="ts" fill="#444441" x="274" y="508" dominant-baseline="central">Mensajería</text>
<rect x="357" y="502" width="10" height="10" rx="2" fill="#E1F5EE"  stroke="#0F6E56" stroke-width="0.5"/>
<text class="ts" fill="#444441" x="373" y="508" dominant-baseline="central">Workers</text>
<rect x="445" y="502" width="10" height="10" rx="2" fill="#FAEEDA"  stroke="#854F0B" stroke-width="0.5"/>
<text class="ts" fill="#444441" x="461" y="508" dominant-baseline="central">Procesamiento Spark</text>
</svg>