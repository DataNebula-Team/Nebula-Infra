<svg width="100%" viewBox="0 0 680 580" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Ciclo de vida de un DAG — NEBULA</title>
<desc>Los 9 pasos del recorrido completo de un DAG: desde la escritura del archivo Python hasta la actualización del estado en la UI de Airflow.</desc>
<style>
  text { font-family: system-ui, sans-serif; }
  .th  { font-size: 13px; font-weight: 500; }
  .ts  { font-size: 11px; font-weight: 400; }
  .tm  { font-size: 10px; font-family: monospace; }
  .num { font-size: 13px; font-weight: 700; }
</style>
<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#D3D1C7" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- ─────────────────────────────────────
     Columna izquierda: números y línea
───────────────────────────────────── -->
<!-- Línea vertical conectora -->
<line x1="60" y1="46" x2="60" y2="534" stroke="#D3D1C7" stroke-width="1.5"/>

<!-- ① -->
<circle cx="60" cy="46" r="18" fill="#534AB7"/>
<text class="num" fill="#fff" x="60" y="46" text-anchor="middle" dominant-baseline="central">1</text>
<rect x="96" y="26" width="548" height="40" rx="6" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="0.5"/>
<text class="th" fill="#3C3489" x="112" y="40" dominant-baseline="central">Definición</text>
<text class="ts" fill="#5F5E5A" x="112" y="57" dominant-baseline="central">El equipo escribe el DAG en Python y hace git push a Nebula-Infra/pipelines/dag/</text>
<rect x="574" y="31" width="64" height="20" rx="3" fill="#534AB7"/>
<text class="tm" fill="#fff" x="606" y="41" text-anchor="middle" dominant-baseline="central">Equipo</text>

<!-- ② -->
<line x1="60" y1="64" x2="60" y2="86" stroke="#D3D1C7" stroke-width="1.5" marker-end="url(#arr)"/>
<circle cx="60" cy="104" r="18" fill="#534AB7"/>
<text class="num" fill="#fff" x="60" y="104" text-anchor="middle" dominant-baseline="central">2</text>
<rect x="96" y="84" width="548" height="40" rx="6" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="0.5"/>
<text class="th" fill="#3C3489" x="112" y="98" dominant-baseline="central">Sincronización</text>
<text class="ts" fill="#5F5E5A" x="112" y="115" dominant-baseline="central">En SRV-MASTER: git pull → archivo disponible en /opt/pipelines/dag dentro del contenedor</text>
<rect x="574" y="89" width="64" height="20" rx="3" fill="#534AB7"/>
<text class="tm" fill="#fff" x="606" y="99" text-anchor="middle" dominant-baseline="central">MASTER</text>

<!-- ③ -->
<line x1="60" y1="122" x2="60" y2="144" stroke="#D3D1C7" stroke-width="1.5" marker-end="url(#arr)"/>
<circle cx="60" cy="162" r="18" fill="#534AB7"/>
<text class="num" fill="#fff" x="60" y="162" text-anchor="middle" dominant-baseline="central">3</text>
<rect x="96" y="142" width="548" height="40" rx="6" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="0.5"/>
<text class="th" fill="#3C3489" x="112" y="156" dominant-baseline="central">Detección</text>
<text class="ts" fill="#5F5E5A" x="112" y="173" dominant-baseline="central">Airflow Scheduler escanea /opt/pipelines/dag/ cada 300 seg y registra el DAG en PostgreSQL</text>
<rect x="574" y="147" width="64" height="20" rx="3" fill="#534AB7"/>
<text class="tm" fill="#fff" x="606" y="157" text-anchor="middle" dominant-baseline="central">MASTER</text>

<!-- ④ -->
<line x1="60" y1="180" x2="60" y2="202" stroke="#D3D1C7" stroke-width="1.5" marker-end="url(#arr)"/>
<circle cx="60" cy="220" r="18" fill="#534AB7"/>
<text class="num" fill="#fff" x="60" y="220" text-anchor="middle" dominant-baseline="central">4</text>
<rect x="96" y="200" width="548" height="40" rx="6" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="0.5"/>
<text class="th" fill="#3C3489" x="112" y="214" dominant-baseline="central">Programación</text>
<text class="ts" fill="#5F5E5A" x="112" y="231" dominant-baseline="central">El Scheduler evalúa el horario del DAG y decide si alguna tarea está lista para ejecutarse</text>
<rect x="574" y="205" width="64" height="20" rx="3" fill="#534AB7"/>
<text class="tm" fill="#fff" x="606" y="215" text-anchor="middle" dominant-baseline="central">MASTER</text>

<!-- ⑤ -->
<line x1="60" y1="238" x2="60" y2="260" stroke="#D3D1C7" stroke-width="1.5" marker-end="url(#arr)"/>
<circle cx="60" cy="278" r="18" fill="#993C1D"/>
<text class="num" fill="#fff" x="60" y="278" text-anchor="middle" dominant-baseline="central">5</text>
<rect x="96" y="258" width="548" height="40" rx="6" fill="#FAECE7" stroke="#F5C4B3" stroke-width="0.5"/>
<text class="th" fill="#712B13" x="112" y="272" dominant-baseline="central">Encolado</text>
<text class="ts" fill="#5F5E5A" x="112" y="289" dominant-baseline="central">Scheduler publica la tarea en RabbitMQ vía protocolo AMQP (puerto 5672)</text>
<rect x="574" y="263" width="64" height="20" rx="3" fill="#993C1D"/>
<text class="tm" fill="#fff" x="606" y="273" text-anchor="middle" dominant-baseline="central">RABBIT</text>

<!-- ⑥ -->
<line x1="60" y1="296" x2="60" y2="318" stroke="#D3D1C7" stroke-width="1.5" marker-end="url(#arr)"/>
<circle cx="60" cy="336" r="18" fill="#0F6E56"/>
<text class="num" fill="#fff" x="60" y="336" text-anchor="middle" dominant-baseline="central">6</text>
<rect x="96" y="316" width="548" height="40" rx="6" fill="#E1F5EE" stroke="#9FE1CB" stroke-width="0.5"/>
<text class="th" fill="#085041" x="112" y="330" dominant-baseline="central">Consumo</text>
<text class="ts" fill="#5F5E5A" x="112" y="347" dominant-baseline="central">El primer Celery Worker disponible toma la tarea de la cola y comienza la ejecución</text>
<rect x="574" y="321" width="64" height="20" rx="3" fill="#0F6E56"/>
<text class="tm" fill="#fff" x="606" y="331" text-anchor="middle" dominant-baseline="central">WORKERS</text>

<!-- ⑦ -->
<line x1="60" y1="354" x2="60" y2="376" stroke="#D3D1C7" stroke-width="1.5" marker-end="url(#arr)"/>
<circle cx="60" cy="394" r="18" fill="#0F6E56"/>
<text class="num" fill="#fff" x="60" y="394" text-anchor="middle" dominant-baseline="central">7</text>
<rect x="96" y="374" width="548" height="50" rx="6" fill="#E1F5EE" stroke="#9FE1CB" stroke-width="0.5"/>
<text class="th" fill="#085041" x="112" y="390" dominant-baseline="central">Ejecución</text>
<text class="ts" fill="#5F5E5A" x="112" y="407" dominant-baseline="central">El Worker ejecuta el código Python. Si la tarea requiere Spark, envía un job al Spark Master</text>
<text class="ts" fill="#5F5E5A" x="112" y="420" dominant-baseline="central">(10.0.2.103:7077) que lo distribuye entre los 4 Spark Workers del clúster</text>
<rect x="574" y="379" width="64" height="20" rx="3" fill="#0F6E56"/>
<text class="tm" fill="#fff" x="606" y="389" text-anchor="middle" dominant-baseline="central">WORKERS</text>

<!-- ⑧ -->
<line x1="60" y1="424" x2="60" y2="446" stroke="#D3D1C7" stroke-width="1.5" marker-end="url(#arr)"/>
<circle cx="60" cy="464" r="18" fill="#534AB7"/>
<text class="num" fill="#fff" x="60" y="464" text-anchor="middle" dominant-baseline="central">8</text>
<rect x="96" y="444" width="548" height="40" rx="6" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="0.5"/>
<text class="th" fill="#3C3489" x="112" y="458" dominant-baseline="central">Resultado</text>
<text class="ts" fill="#5F5E5A" x="112" y="475" dominant-baseline="central">El Worker guarda el resultado (éxito / fallo) en PostgreSQL, el result backend de Celery</text>
<rect x="574" y="449" width="64" height="20" rx="3" fill="#534AB7"/>
<text class="tm" fill="#fff" x="606" y="459" text-anchor="middle" dominant-baseline="central">MASTER</text>

<!-- ⑨ -->
<line x1="60" y1="482" x2="60" y2="504" stroke="#D3D1C7" stroke-width="1.5" marker-end="url(#arr)"/>
<circle cx="60" cy="522" r="18" fill="#185FA5"/>
<text class="num" fill="#fff" x="60" y="522" text-anchor="middle" dominant-baseline="central">9</text>
<rect x="96" y="502" width="548" height="40" rx="6" fill="#E6F1FB" stroke="#B5D4F4" stroke-width="0.5"/>
<text class="th" fill="#0C447C" x="112" y="516" dominant-baseline="central">Actualización</text>
<text class="ts" fill="#5F5E5A" x="112" y="533" dominant-baseline="central">Airflow consulta el result backend y actualiza el estado de la tarea en la interfaz web</text>
<rect x="574" y="507" width="64" height="20" rx="3" fill="#185FA5"/>
<text class="tm" fill="#fff" x="606" y="517" text-anchor="middle" dominant-baseline="central">Airflow UI</text>

<!-- Nota ciclo al pie -->
<rect x="96" y="550" width="548" height="22" rx="4" fill="#F1EFE8" stroke="#D3D1C7" stroke-width="0.5"/>
<text class="tm" fill="#5F5E5A" x="370" y="561" text-anchor="middle" dominant-baseline="central">Si el DAG tiene más tareas pendientes → el ciclo se repite desde el paso 5</text>
</svg>