<svg width="100%" viewBox="0 0 680 420" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Comunicación entre instancias — flujo Celery y flujo Spark</title>
<desc>Dos secciones separadas mostrando el flujo de comunicación del sistema Celery/Airflow y del clúster Spark, con sus puertos y protocolos.</desc>
<style>
  text { font-family: system-ui, sans-serif; }
  .th  { font-size: 13px; font-weight: 500; }
  .ts  { font-size: 11px; font-weight: 400; }
  .tm  { font-size: 10px; font-family: monospace; }
  .lbl { font-size: 10px; font-weight: 500; font-family: monospace; }
</style>
<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arrd" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#534AB7" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- ══════════════════════════════════
     SECCIÓN A — Flujo Celery / Airflow
═══════════════════════════════════ -->

<!-- Fondo sección A -->
<rect x="20" y="20" width="300" height="380" rx="8" fill="#FAFAFA" stroke="#D3D1C7" stroke-width="0.8"/>
<text class="th" fill="#444441" x="170" y="42" text-anchor="middle" dominant-baseline="central">Flujo Celery / Airflow</text>

<!-- 1. SRV-PROXY -->
<rect x="50" y="56" width="240" height="44" rx="6" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.8"/>
<text class="th" fill="#0C447C" x="170" y="72" text-anchor="middle" dominant-baseline="central">SRV-PROXY</text>
<text class="tm" fill="#185FA5" x="170" y="88" text-anchor="middle" dominant-baseline="central">34.225.146.184</text>

<!-- flecha 1→2 -->
<line x1="170" y1="100" x2="170" y2="124" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>
<text class="lbl" fill="#185FA5" x="178" y="115" dominant-baseline="central">HTTP :8080 · :5555</text>

<!-- 2. SRV-MASTER -->
<rect x="50" y="124" width="240" height="44" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.8"/>
<text class="th" fill="#3C3489" x="170" y="140" text-anchor="middle" dominant-baseline="central">SRV-MASTER</text>
<text class="tm" fill="#534AB7" x="170" y="156" text-anchor="middle" dominant-baseline="central">10.0.2.54</text>

<!-- flecha 2→3 -->
<line x1="170" y1="168" x2="170" y2="192" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>
<text class="lbl" fill="#993C1D" x="178" y="183" dominant-baseline="central">AMQP :5672</text>

<!-- 3. SRV-RABBIT -->
<rect x="50" y="192" width="240" height="44" rx="6" fill="#FAECE7" stroke="#993C1D" stroke-width="0.8"/>
<text class="th" fill="#712B13" x="170" y="208" text-anchor="middle" dominant-baseline="central">SRV-RABBIT</text>
<text class="tm" fill="#993C1D" x="170" y="224" text-anchor="middle" dominant-baseline="central">10.0.2.61</text>

<!-- flecha 3→4 -->
<line x1="170" y1="236" x2="170" y2="260" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>
<text class="lbl" fill="#993C1D" x="178" y="251" dominant-baseline="central">tareas Celery</text>

<!-- 4. SRV-WORKERS -->
<rect x="50" y="260" width="240" height="44" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
<text class="th" fill="#085041" x="170" y="276" text-anchor="middle" dominant-baseline="central">SRV-WORKER 1 / 2 / 3</text>
<text class="tm" fill="#0F6E56" x="170" y="292" text-anchor="middle" dominant-baseline="central">.240 · .95 · .79</text>

<!-- flecha retorno Workers → Master (result backend) -->
<!-- Va por la derecha: baja de Master (290,146), baja hasta Workers nivel, sube de vuelta -->
<path d="M290 146 L306 146 L306 282 L290 282" fill="none" stroke="#534AB7" stroke-width="0.8" stroke-dasharray="4 2" marker-end="url(#arrd)"/>
<text class="lbl" fill="#534AB7" x="308" y="220" dominant-baseline="central">result</text>
<text class="lbl" fill="#534AB7" x="308" y="232" dominant-baseline="central">:5432</text>

<!-- Nota resultado -->
<rect x="50" y="322" width="240" height="30" rx="4" fill="#F1EFE8" stroke="#D3D1C7" stroke-width="0.5"/>
<text class="ts" fill="#5F5E5A" x="170" y="337" text-anchor="middle" dominant-baseline="central">Resultado guardado en PostgreSQL</text>

<!-- ══════════════════════════════════
     SECCIÓN B — Flujo Spark
═══════════════════════════════════ -->

<!-- Fondo sección B -->
<rect x="360" y="20" width="300" height="380" rx="8" fill="#FAFAFA" stroke="#D3D1C7" stroke-width="0.8"/>
<text class="th" fill="#444441" x="510" y="42" text-anchor="middle" dominant-baseline="central">Flujo Spark</text>

<!-- Nota inicio -->
<rect x="390" y="56" width="240" height="44" rx="6" fill="#F1EFE8" stroke="#D3D1C7" stroke-width="0.5"/>
<text class="ts" fill="#5F5E5A" x="510" y="72" text-anchor="middle" dominant-baseline="central">Iniciado por Airflow</text>
<text class="ts" fill="#5F5E5A" x="510" y="88" text-anchor="middle" dominant-baseline="central">cuando un DAG lanza un job Spark</text>

<!-- flecha inicio → Master -->
<line x1="510" y1="100" x2="510" y2="124" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>

<!-- 1. SRV-MASTER (driver) -->
<rect x="390" y="124" width="240" height="44" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.8"/>
<text class="th" fill="#3C3489" x="510" y="140" text-anchor="middle" dominant-baseline="central">SRV-MASTER — Driver</text>
<text class="tm" fill="#534AB7" x="510" y="156" text-anchor="middle" dominant-baseline="central">10.0.2.54</text>

<!-- flecha 1→2 -->
<line x1="510" y1="168" x2="510" y2="192" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>
<text class="lbl" fill="#854F0B" x="518" y="183" dominant-baseline="central">TCP :7077</text>

<!-- 2. SRV-SPARK (master) -->
<rect x="390" y="192" width="240" height="44" rx="6" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.8"/>
<text class="th" fill="#633806" x="510" y="208" text-anchor="middle" dominant-baseline="central">SRV-SPARK — Master</text>
<text class="tm" fill="#854F0B" x="510" y="224" text-anchor="middle" dominant-baseline="central">10.0.2.103</text>

<!-- flecha 2→3 -->
<line x1="510" y1="236" x2="510" y2="260" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>
<text class="lbl" fill="#854F0B" x="518" y="251" dominant-baseline="central">particiones datos</text>

<!-- 3. SRV-WORKERS (spark workers) -->
<rect x="390" y="260" width="240" height="44" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
<text class="th" fill="#085041" x="510" y="276" text-anchor="middle" dominant-baseline="central">SRV-WORKER 1 / 2 / 3</text>
<text class="tm" fill="#0F6E56" x="510" y="292" text-anchor="middle" dominant-baseline="central">+ spark-worker-1 en SRV-SPARK</text>

<!-- flecha retorno Workers → Spark Master (resultado) -->
<path d="M630 282 L646 282 L646 214 L630 214" fill="none" stroke="#854F0B" stroke-width="0.8" stroke-dasharray="4 2" marker-end="url(#arr)"/>
<text class="lbl" fill="#854F0B" x="648" y="252" dominant-baseline="central">result</text>

<!-- Nota resultado -->
<rect x="390" y="322" width="240" height="30" rx="4" fill="#F1EFE8" stroke="#D3D1C7" stroke-width="0.5"/>
<text class="ts" fill="#5F5E5A" x="510" y="337" text-anchor="middle" dominant-baseline="central">4 Workers en total procesan en paralelo</text>

<!-- ── Leyenda global ── -->
<line x1="20" y1="406" x2="660" y2="406" stroke="#D3D1C7" stroke-width="0.5"/>
<line x1="40" y1="414" x2="64" y2="414" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>
<text class="ts" fill="#444441" x="68" y="414" dominant-baseline="central">flujo de datos</text>
<line x1="180" y1="414" x2="204" y2="414" stroke="#534AB7" stroke-width="0.8" stroke-dasharray="4 2" marker-end="url(#arrd)"/>
<text class="ts" fill="#444441" x="208" y="414" dominant-baseline="central">resultado / retorno</text>
</svg>