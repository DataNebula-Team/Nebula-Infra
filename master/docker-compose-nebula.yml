x-airflow-common: &airflow-common
  image: apache/airflow:3.2.0

  env_file:
    - .env

  volumes:
    - airflow_logs:/opt/airflow/logs
    - airflow_config:/opt/airflow/config
    - airflow_plugins:/opt/airflow/plugins

    - ../pipelines/dags:/opt/airflow/dags
    - ../pipelines/data:/opt/airflow/data
    - ../pipelines:/opt/pipelines

  user: "${AIRFLOW_UID:-50000}:0"

services:

  postgres:
    image: postgres:16

    restart: unless-stopped

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  airflow-apiserver:
    <<: *airflow-common

    command: airflow api-server

    ports:
      - "8080:8080"

    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "--fail",
          "http://localhost:8080/api/v2/monitor/health"
        ]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

    restart: always

  airflow-scheduler:
    <<: *airflow-common

    command: scheduler

    depends_on:
      airflow-apiserver:
        condition: service_healthy

    restart: always

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "airflow jobs check --job-type SchedulerJob --hostname \"$${HOSTNAME}\""
        ]
      interval: 30s
      timeout: 10s
      retries: 5

  airflow-dag-processor:
    <<: *airflow-common

    command: dag-processor

    depends_on:
      airflow-apiserver:
        condition: service_healthy

    restart: always

  airflow-triggerer:
    <<: *airflow-common

    command: triggerer

    depends_on:
      airflow-apiserver:
        condition: service_healthy

    restart: always


  flower:
    <<: *airflow-common

    command: celery flower

    ports:
      - "5555:5555"

    depends_on:
      airflow-apiserver:
        condition: service_healthy

    restart: always

  airflow-init:
    <<: *airflow-common

    user: "0:0"

    profiles:
      - init

    entrypoint: /bin/bash

    command:
      - -c
      - |
        mkdir -p /opt/airflow/{logs,dags,plugins,config}

        mkdir -p /opt/airflow/data/input
        mkdir -p /opt/airflow/data/output/valid
        mkdir -p /opt/airflow/data/output/invalid
        mkdir -p /opt/airflow/data/output/reports
        mkdir -p /opt/airflow/data/output/metrics

        mkdir -p /opt/pipelines/logs

        chown -R "${AIRFLOW_UID}:0" /opt/airflow/
        chown -R "${AIRFLOW_UID}:0" /opt/pipelines/

        /entrypoint airflow db migrate

        echo "=== Init done ==="

  airflow-cli:
    <<: *airflow-common

    profiles:
      - debug

    command: bash

volumes:
  postgres_data:
  airflow_logs:
  airflow_config:
  airflow_plugins: